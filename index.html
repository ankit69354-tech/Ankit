<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">🎓 StudentApp</div>
      <div class="subtitle">Full Stack Demo — Spring Boot + Supabase</div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- API STATUS BANNER -->
    <div id="api-status" class="status-banner checking">
      ⏳ Checking API connection...
    </div>

    <!-- FORM SECTION -->
    <section class="card">
      <h2 id="form-title">➕ Add New Student</h2>
      <div class="form-grid">
        <input type="hidden" id="student-id"/>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" placeholder="e.g. Priya Sharma"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="e.g. priya@example.com"/>
        </div>
        <div class="form-group">
          <label>Course *</label>
          <input type="text" id="course" placeholder="e.g. Computer Science"/>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="age" placeholder="e.g. 20" min="10" max="100"/>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitStudent()">💾 Save Student</button>
        <button class="btn btn-secondary" onclick="resetForm()">✖ Cancel</button>
      </div>
      <div id="form-message" class="form-message"></div>
    </section>

    <!-- SEARCH SECTION -->
    <section class="card">
      <h2>🔍 Search Students</h2>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search by name..." onkeyup="searchStudents()"/>
        <button class="btn btn-outline" onclick="loadAllStudents()">Show All</button>
      </div>
    </section>

    <!-- STUDENTS TABLE -->
    <section class="card">
      <h2>👥 All Students <span id="student-count" class="count-badge">0</span></h2>
      <div class="table-wrap">
        <table id="student-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Age</th>
              <th>Enrolled</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="student-tbody">
            <tr><td colspan="7" class="empty-msg">Loading students...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>Built with ❤️ using Spring Boot + PostgreSQL (Supabase) | Deployed via GitHub + Railway + Netlify</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
